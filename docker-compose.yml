version: '3.8'
services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - minio-data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: docs-agent-ingestion
    environment:
      MILVUS_URI: http://milvus:19530
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP: "200"
      EMBEDDING_MODEL: sentence-transformers/all-mpnet-base-v2
      DOCS_COLLECTION: docs_rag
    depends_on:
      milvus:
        condition: service_healthy
    working_dir: /app
    command: python -m ingestion.pipeline

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: docs-agent-server
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      MILVUS_URI: http://milvus:19530
      LLM_API_URL: ${LLM_API_URL:-https://api.groq.com/openai/v1/chat/completions}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      CONTENT_MAX_CHARS: "0"
      EMBEDDING_MODEL: sentence-transformers/all-mpnet-base-v2
      DOCS_COLLECTION: docs_rag
      ISSUES_COLLECTION: issues_rag
    depends_on:
      milvus:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docs-agent-frontend
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  etcd-data:
  minio-data:
  milvus-data:
