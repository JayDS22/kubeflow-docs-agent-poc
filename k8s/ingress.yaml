apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-agent-ingress
  namespace: docs-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: docs-agent-server
            port:
              number: 8000
      - path: /mcp
        pathType: Prefix
        backend:
          service:
            name: docs-agent-server
            port:
              number: 8001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: docs-agent-frontend
            port:
              number: 80
